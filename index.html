<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>跳跳跳</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #0e1320;
    color: #fff;
    user-select: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* ====== 广告位 ====== */
  .ad-banner, .ad-bottom {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7794;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .ad-banner {
    height: 60px;
    background: linear-gradient(90deg, #1a2238, #232b45);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .ad-bottom {
    height: 50px;
    background: linear-gradient(90deg, #232b45, #1a2238);
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  /* ====== 游戏区 ====== */
  #game-wrap {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #1a2347 0%, #2d3561 50%, #4a3d6b 100%);
  }

  /* HUD */
  .hud {
    position: absolute;
    top: 16px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    pointer-events: none;
    z-index: 5;
  }
  .score-wrap { display: flex; flex-direction: column; }
  .score {
    font-size: 42px;
    font-weight: 800;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    letter-spacing: -1px;
    line-height: 1;
  }
  .combo {
    font-size: 14px;
    color: #ffd86b;
    margin-top: 4px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .combo.show { opacity: 1; transform: translateY(0); }
  .right-info { text-align: right; }
  .best { font-size: 12px; opacity: 0.7; }
  .coin-display {
    font-size: 14px;
    margin-top: 4px;
    color: #ffd86b;
    font-weight: 600;
  }

  .hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    opacity: 0.6;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 5;
    text-align: center;
    white-space: nowrap;
  }
  .hint.hidden { opacity: 0; }

  /* 浮动得分提示 */
  .float-score {
    position: absolute;
    pointer-events: none;
    font-size: 28px;
    font-weight: 800;
    color: #ffd86b;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    z-index: 6;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-60px) scale(1); }
  }

  /* ====== 通用遮罩 ====== */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(14, 19, 32, 0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
    transition: opacity 0.3s;
    overflow-y: auto;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .title {
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffd86b, #ff7eb3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    letter-spacing: -2px;
  }
  .subtitle {
    font-size: 13px;
    opacity: 0.6;
    margin-bottom: 28px;
    letter-spacing: 2px;
  }
  .end-score { font-size: 14px; opacity: 0.6; margin-bottom: 4px; }
  .end-num { font-size: 64px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .end-best { font-size: 13px; opacity: 0.5; margin-bottom: 24px; }

  /* 按钮 */
  .btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #ffd86b, #ff7eb3);
    color: #1a1a2e;
    border: none;
    border-radius: 100px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 126, 179, 0.3);
    transition: transform 0.15s;
    margin-bottom: 10px;
    min-width: 200px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: none;
    font-size: 14px;
    padding: 12px 32px;
  }
  .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* 顶部小按钮 */
  .top-buttons {
    position: absolute;
    top: 70px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 5;
  }
  .icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    transition: transform 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.alert::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: #ff5e5e;
    border-radius: 50%;
    top: 8px;
    right: 8px;
  }

  /* 皮肤面板 */
  .panel-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .panel-sub { font-size: 12px; opacity: 0.6; margin-bottom: 24px; letter-spacing: 1px; }

  .skins {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 20px;
  }
  .skin-card {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    overflow: hidden;
  }
  .skin-card.owned { border-color: rgba(255,216,107,0.4); }
  .skin-card.active {
    border-color: #ffd86b;
    background: rgba(255,216,107,0.15);
    transform: scale(1.04);
  }
  .skin-preview {
    width: 36px;
    height: 50px;
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    margin-bottom: 8px;
  }
  .skin-name { font-size: 11px; font-weight: 600; }
  .skin-cost {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 2px;
    color: #ffd86b;
  }
  .skin-card.locked .skin-preview { filter: grayscale(1) brightness(0.5); }
  .skin-card.locked .skin-name { opacity: 0.5; }

  /* 签到面板 */
  .signin-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 20px;
  }
  .day-card {
    aspect-ratio: 0.8;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    position: relative;
  }
  .day-card.signed {
    background: rgba(255,216,107,0.2);
    border-color: rgba(255,216,107,0.5);
  }
  .day-card.today {
    border-color: #ff7eb3;
    box-shadow: 0 0 12px rgba(255,126,179,0.4);
  }
  .day-num { font-size: 11px; opacity: 0.6; margin-bottom: 2px; }
  .day-reward { font-size: 14px; font-weight: 700; color: #ffd86b; }
  .day-card.signed .day-reward::after { content: ' ✓'; color: #6bff9e; }

  /* Toast */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  .row { display: flex; gap: 8px; }
</style>
</head>
<body>
<div id="app">

  <!-- ============================================ -->
  <!-- 顶部横幅广告位 — 替换为 AdSense / AdMob 代码 -->
  <!-- ============================================ -->
  <div class="ad-banner" id="ad-top">
    <!-- AdSense 示例:
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:50px"
         data-ad-client="ca-pub-XXXXXXXXXX"
         data-ad-slot="1234567890"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    广告位 · 顶部 BANNER
  </div>

  <div id="game-wrap">
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="score-wrap">
        <div class="score" id="score">0</div>
        <div class="combo" id="combo">连击 ×2</div>
      </div>
      <div class="right-info">
        <div class="best">最佳 <span id="best">0</span></div>
        <div class="coin-display">🪙 <span id="coins">0</span></div>
      </div>
    </div>

    <div class="top-buttons">
      <div class="icon-btn" id="signin-btn" title="签到">📅</div>
      <div class="icon-btn" id="skin-btn" title="皮肤">👕</div>
      <div class="icon-btn" id="sound-btn" title="声音">🔊</div>
    </div>

    <div class="hint" id="hint">按住屏幕蓄力 · 松开起跳</div>

    <!-- 开始界面 -->
    <div class="overlay" id="start-screen">
      <div class="title">跳跳跳</div>
      <div class="subtitle">JUMP · JUMP · JUMP</div>
      <button class="btn" id="start-btn">开 始</button>
      <button class="btn btn-secondary" id="start-skin-btn">👕 皮肤</button>
      <button class="btn btn-secondary" id="start-share-btn">📤 分享给好友</button>
    </div>

    <!-- 结束界面 -->
    <div class="overlay hidden" id="end-screen">
      <div class="end-score">本局得分</div>
      <div class="end-num" id="end-num">0</div>
      <div class="end-best">最佳 <span id="end-best">0</span> · 获得 🪙<span id="earned-coins">0</span></div>
      <button class="btn" id="restart-btn">再来一局</button>
      <!-- 激励视频广告位 — 看广告复活 -->
      <button class="btn btn-secondary" id="revive-btn">📺 看广告复活</button>
      <button class="btn btn-secondary" id="end-share-btn">📤 分享炫耀战绩</button>
    </div>

    <!-- 皮肤面板 -->
    <div class="overlay hidden" id="skin-screen">
      <div class="panel-title">皮肤</div>
      <div class="panel-sub">SKINS · 🪙 <span id="skin-coins">0</span></div>
      <div class="skins" id="skin-grid"></div>
      <button class="btn btn-secondary" id="skin-close">关 闭</button>
    </div>

    <!-- 签到面板 -->
    <div class="overlay hidden" id="signin-screen">
      <div class="panel-title">每日签到</div>
      <div class="panel-sub">连续签到奖励翻倍</div>
      <div class="signin-grid" id="signin-grid"></div>
      <button class="btn" id="signin-action-btn">立即签到</button>
      <button class="btn btn-secondary" id="signin-close">关 闭</button>
    </div>

  </div>

  <!-- 底部广告位 -->
  <div class="ad-bottom" id="ad-bottom">
    <!-- AdSense 自适应横幅放这里 -->
    广告位 · 底部
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){

  // =========================================================
  // 工具函数
  // =========================================================
  const LS = {
    get: (k, d) => { try { const v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); } catch(e) { return d; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  };
  const rand = (a, b) => a + Math.random() * (b - a);
  const today = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  function toast(msg, dur=1500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), dur);
  }

  // =========================================================
  // 音效系统(Web Audio API,无需音频文件)
  // =========================================================
  let audioCtx = null;
  let soundOn = LS.get('sound_on', true);

  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { soundOn = false; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function beep(freq, dur, type='sine', vol=0.15) {
    if (!soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  const sfx = {
    charge: () => beep(220, 0.1, 'square', 0.08),
    jump:   () => beep(660, 0.15, 'triangle', 0.2),
    land:   () => { beep(440, 0.08, 'sine', 0.2); setTimeout(()=>beep(550, 0.1, 'sine', 0.15), 50); },
    combo:  (n) => beep(600 + n*100, 0.12, 'triangle', 0.2),
    fail:   () => { beep(200, 0.2, 'sawtooth', 0.15); setTimeout(()=>beep(150, 0.3, 'sawtooth', 0.15), 100); },
    coin:   () => beep(880, 0.1, 'square', 0.15),
  };

  // =========================================================
  // 皮肤系统
  // =========================================================
  const SKINS = [
    { id: 'default', name: '小桃子', cost: 0,    grad: ['#ff7eb3', '#ffd86b'] },
    { id: 'mint',    name: '薄荷糖', cost: 100,  grad: ['#6bffa8', '#6be3ff'] },
    { id: 'grape',   name: '紫葡萄', cost: 200,  grad: ['#a06bff', '#ff6bd9'] },
    { id: 'fire',    name: '小火苗', cost: 500,  grad: ['#ff4d4d', '#ffb84d'] },
    { id: 'ice',     name: '冰晶',   cost: 800,  grad: ['#a6e9ff', '#ffffff'] },
    { id: 'gold',    name: '黄金',   cost: 1500, grad: ['#ffd700', '#ff9500'] },
    { id: 'panda',   name: '熊猫',   cost: 'ad', grad: ['#ffffff', '#2a2a2a'] },
    { id: 'rainbow', name: '彩虹',   cost: 'share', grad: ['#ff5e5e', '#5eaaff'] },
    { id: 'galaxy',  name: '星河',   cost: 3000, grad: ['#1a0a3a', '#7e5eff'] },
  ];

  let coins = LS.get('coins', 0);
  let ownedSkins = LS.get('owned_skins', ['default']);
  let activeSkin = LS.get('active_skin', 'default');
  function getSkin() { return SKINS.find(s => s.id === activeSkin) || SKINS[0]; }
  function updateCoinsUI() {
    document.getElementById('coins').textContent = coins;
    document.getElementById('skin-coins').textContent = coins;
  }
  function saveSkins() {
    LS.set('coins', coins);
    LS.set('owned_skins', ownedSkins);
    LS.set('active_skin', activeSkin);
    updateCoinsUI();
  }

  function renderSkins() {
    const grid = document.getElementById('skin-grid');
    grid.innerHTML = '';
    SKINS.forEach(skin => {
      const owned = ownedSkins.includes(skin.id);
      const active = activeSkin === skin.id;
      const card = document.createElement('div');
      card.className = 'skin-card' + (owned ? ' owned' : ' locked') + (active ? ' active' : '');

      const preview = document.createElement('div');
      preview.className = 'skin-preview';
      preview.style.background = `linear-gradient(135deg, ${skin.grad[0]}, ${skin.grad[1]})`;
      card.appendChild(preview);

      const name = document.createElement('div');
      name.className = 'skin-name';
      name.textContent = skin.name;
      card.appendChild(name);

      if (!owned) {
        const cost = document.createElement('div');
        cost.className = 'skin-cost';
        if (skin.cost === 'ad') cost.textContent = '📺 看广告';
        else if (skin.cost === 'share') cost.textContent = '📤 分享';
        else cost.textContent = '🪙 ' + skin.cost;
        card.appendChild(cost);
      } else if (!active) {
        const tip = document.createElement('div');
        tip.className = 'skin-cost';
        tip.textContent = '点击使用';
        card.appendChild(tip);
      } else {
        const tip = document.createElement('div');
        tip.className = 'skin-cost';
        tip.textContent = '使用中';
        tip.style.color = '#6bff9e';
        card.appendChild(tip);
      }

      card.addEventListener('click', () => handleSkinClick(skin));
      grid.appendChild(card);
    });
  }

  function handleSkinClick(skin) {
    const owned = ownedSkins.includes(skin.id);
    if (owned) {
      activeSkin = skin.id;
      saveSkins();
      renderSkins();
      sfx.coin();
      toast('已切换到「' + skin.name + '」');
      return;
    }
    if (skin.cost === 'ad') {
      // 激励视频解锁:接入 SDK 后,在视频播完回调里执行下面逻辑
      simulateAd(() => {
        ownedSkins.push(skin.id);
        saveSkins(); renderSkins();
        toast('解锁成功:' + skin.name);
        sfx.coin();
      });
    } else if (skin.cost === 'share') {
      doShare(() => {
        ownedSkins.push(skin.id);
        saveSkins(); renderSkins();
        toast('分享成功,解锁:' + skin.name);
        sfx.coin();
      });
    } else {
      if (coins >= skin.cost) {
        coins -= skin.cost;
        ownedSkins.push(skin.id);
        activeSkin = skin.id;
        saveSkins(); renderSkins();
        sfx.coin();
        toast('购买成功!');
      } else {
        toast('金币不够,继续跳吧~');
      }
    }
  }

  // =========================================================
  // 每日签到
  // =========================================================
  const SIGNIN_REWARDS = [10, 20, 30, 50, 80, 120, 200];
  let signInData = LS.get('signin', { lastDate: '', streak: 0, signedDates: [] });

  function isSignedToday() {
    return signInData.lastDate === today();
  }

  function renderSignin() {
    const grid = document.getElementById('signin-grid');
    grid.innerHTML = '';
    const streak = signInData.streak;
    const signedToday = isSignedToday();
    for (let i = 0; i < 7; i++) {
      const day = document.createElement('div');
      const isPast = i < streak;
      const isToday = (signedToday && i === streak - 1) || (!signedToday && i === streak);
      day.className = 'day-card' + (isPast ? ' signed' : '') + (isToday ? ' today' : '');
      day.innerHTML = `<div class="day-num">第${i+1}天</div><div class="day-reward">🪙${SIGNIN_REWARDS[i]}</div>`;
      grid.appendChild(day);
    }
    const btn = document.getElementById('signin-action-btn');
    if (signedToday) {
      btn.textContent = '今日已签到';
      btn.style.opacity = 0.5;
      btn.disabled = true;
    } else {
      btn.textContent = '立即签到';
      btn.style.opacity = 1;
      btn.disabled = false;
    }
    // 红点提示
    document.getElementById('signin-btn').classList.toggle('alert', !signedToday);
  }

  function doSignin() {
    if (isSignedToday()) return;
    // 判断是否中断了连续签到
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
    if (signInData.lastDate !== yKey) signInData.streak = 0;

    const idx = signInData.streak % 7;
    const reward = SIGNIN_REWARDS[idx];
    coins += reward;
    signInData.streak += 1;
    signInData.lastDate = today();
    LS.set('signin', signInData);
    saveSkins();
    sfx.coin();
    toast(`签到成功!+🪙${reward}`);
    renderSignin();
  }

  // =========================================================
  // 分享 + 模拟广告
  // =========================================================
  function doShare(onSuccess) {
    const text = `我在「跳跳跳」拿了 ${best} 分,你来挑战一下?`;
    const url = location.href;
    if (navigator.share) {
      navigator.share({ title: '跳跳跳', text, url }).then(() => {
        onSuccess && onSuccess();
      }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text + ' ' + url).then(() => {
        toast('链接已复制,快去粘贴给好友!');
        onSuccess && onSuccess();
      });
    } else {
      toast('请手动复制网址分享');
      onSuccess && onSuccess();
    }
  }

  function simulateAd(onComplete) {
    // 实际接入 AdMob/穿山甲 SDK 时,把这段替换成真实激励视频调用
    // window.AdMob.showRewardVideoAd({ onReward: onComplete });
    toast('模拟广告播放中... (3秒)', 3000);
    setTimeout(onComplete, 3000);
  }

  // =========================================================
  // 主游戏
  // =========================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const comboEl = document.getElementById('combo');
  const hintEl = document.getElementById('hint');
  const startScreen = document.getElementById('start-screen');
  const endScreen = document.getElementById('end-screen');
  const skinScreen = document.getElementById('skin-screen');
  const signinScreen = document.getElementById('signin-screen');
  const endNumEl = document.getElementById('end-num');
  const endBestEl = document.getElementById('end-best');
  const earnedCoinsEl = document.getElementById('earned-coins');

  let W = 0, H = 0, DPR = window.devicePixelRatio || 1;
  function resize() {
    const wrap = canvas.parentElement;
    W = wrap.clientWidth; H = wrap.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const STATE = { READY: 0, CHARGING: 1, JUMPING: 2, OVER: 3 };
  let state = STATE.READY;

  const player = {
    x: 0, y: 0, w: 18, h: 38,
    vx: 0, vy: 0, squash: 0, rotation: 0,
  };

  let platforms = [];
  let camera = { x: 0 };
  let score = 0;
  let best = LS.get('jump_best', 0);
  let combo = 0;
  let comboTimer = 0;
  let chargeStart = 0;
  let chargePower = 0;
  let usedRevive = false;
  let earnedThisRound = 0;
  let floatScores = []; // 浮动分数动画
  let particles = [];   // 粒子效果

  bestEl.textContent = best;
  updateCoinsUI();

  function newPlatform(prevX, prevY) {
    const types = ['box', 'cyl'];
    const type = types[Math.floor(Math.random() * types.length)];
    const w = rand(60, 90);
    const gap = rand(70, 160);
    return {
      x: prevX + gap,
      y: prevY + rand(-20, 20),
      w, h: 22, type,
      color: `hsl(${Math.floor(rand(180, 320))}, 60%, 65%)`,
    };
  }

  function reset() {
    platforms = [];
    platforms.push({ x: 80, y: H * 0.65, w: 90, h: 22, type: 'box', color: '#ffd86b' });
    for (let i = 0; i < 10; i++) {
      const last = platforms[platforms.length - 1];
      platforms.push(newPlatform(last.x + last.w/2, last.y));
    }
    player.x = platforms[0].x;
    player.y = platforms[0].y - player.h/2 - 11;
    player.vx = 0; player.vy = 0; player.squash = 0; player.rotation = 0;
    camera.x = 0;
    score = 0;
    combo = 0; comboTimer = 0;
    earnedThisRound = 0;
    chargePower = 0;
    usedRevive = false;
    floatScores = []; particles = [];
    scoreEl.textContent = 0;
    comboEl.classList.remove('show');
    state = STATE.READY;
    hintEl.classList.remove('hidden');
  }

  function startGame() {
    ensureAudio();
    reset();
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    skinScreen.classList.add('hidden');
    signinScreen.classList.add('hidden');
  }

  function endGame() {
    state = STATE.OVER;
    sfx.fail();
    endNumEl.textContent = score;
    if (score > best) {
      best = score;
      LS.set('jump_best', best);
    }
    bestEl.textContent = best;
    endBestEl.textContent = best;
    // 累加金币
    coins += earnedThisRound;
    saveSkins();
    earnedCoinsEl.textContent = earnedThisRound;
    document.getElementById('revive-btn').style.display = usedRevive ? 'none' : 'inline-block';
    setTimeout(() => endScreen.classList.remove('hidden'), 600);
  }

  // 控制
  function onPressStart(e) {
    if (e.target !== canvas) return;
    e.preventDefault();
    ensureAudio();
    if (state !== STATE.READY) return;
    state = STATE.CHARGING;
    chargeStart = performance.now();
    hintEl.classList.add('hidden');
    sfx.charge();
  }
  function onPressEnd(e) {
    if (state !== STATE.CHARGING) return;
    e.preventDefault();
    const dt = Math.min(1500, performance.now() - chargeStart);
    chargePower = dt / 1500;
    player.vx = chargePower * 12 + 2;
    player.vy = -18 - chargePower * 4;
    state = STATE.JUMPING;
    player.squash = 0;
    sfx.jump();
  }
  canvas.addEventListener('touchstart', onPressStart, { passive: false });
  canvas.addEventListener('touchend', onPressEnd, { passive: false });
  canvas.addEventListener('mousedown', onPressStart);
  canvas.addEventListener('mouseup', onPressEnd);

  // UI 按钮
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);

  document.getElementById('start-skin-btn').addEventListener('click', () => {
    renderSkins();
    skinScreen.classList.remove('hidden');
  });
  document.getElementById('skin-btn').addEventListener('click', () => {
    renderSkins();
    skinScreen.classList.remove('hidden');
  });
  document.getElementById('skin-close').addEventListener('click', () => {
    skinScreen.classList.add('hidden');
  });

  document.getElementById('signin-btn').addEventListener('click', () => {
    renderSignin();
    signinScreen.classList.remove('hidden');
  });
  document.getElementById('signin-close').addEventListener('click', () => {
    signinScreen.classList.add('hidden');
  });
  document.getElementById('signin-action-btn').addEventListener('click', doSignin);

  document.getElementById('start-share-btn').addEventListener('click', () => doShare());
  document.getElementById('end-share-btn').addEventListener('click', () => doShare());

  document.getElementById('sound-btn').addEventListener('click', (e) => {
    soundOn = !soundOn;
    LS.set('sound_on', soundOn);
    e.currentTarget.textContent = soundOn ? '🔊' : '🔇';
    if (soundOn) ensureAudio();
  });
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';

  document.getElementById('revive-btn').addEventListener('click', () => {
    simulateAd(() => {
      usedRevive = true;
      let target = platforms[0], bd = Infinity;
      platforms.forEach(p => {
        const d = Math.abs(p.x - player.x);
        if (d < bd) { bd = d; target = p; }
      });
      player.x = target.x;
      player.y = target.y - player.h/2 - 11;
      player.vx = 0; player.vy = 0;
      state = STATE.READY;
      endScreen.classList.add('hidden');
      hintEl.classList.remove('hidden');
    });
  });

  // =========================================================
  // 物理 + 渲染
  // =========================================================
  const G = 0.6;

  function spawnParticles(x, y, color, n=8) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: rand(-3, 3),
        vy: rand(-5, -1),
        life: 1,
        color,
        size: rand(2, 5),
      });
    }
  }

  function spawnFloatScore(x, y, text) {
    const el = document.createElement('div');
    el.className = 'float-score';
    el.textContent = text;
    el.style.left = (x - camera.x) + 'px';
    el.style.top = y + 'px';
    document.getElementById('game-wrap').appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function update() {
    if (state === STATE.CHARGING) {
      const dt = Math.min(1500, performance.now() - chargeStart);
      player.squash = (dt / 1500) * 0.5;
    } else {
      player.squash *= 0.85;
    }

    if (state === STATE.JUMPING) {
      player.x += player.vx;
      player.y += player.vy;
      player.vy += G;
      player.rotation += 0.2;

      if (player.vy > 0) {
        for (const p of platforms) {
          const inX = player.x > p.x - p.w/2 && player.x < p.x + p.w/2;
          const playerBottom = player.y + player.h/2;
          if (inX && playerBottom >= p.y - p.h/2 && playerBottom <= p.y - p.h/2 + 20) {
            player.y = p.y - p.h/2 - player.h/2;
            player.vy = 0; player.vx = 0; player.rotation = 0;
            state = STATE.READY;
            hintEl.classList.remove('hidden');

            const idx = platforms.indexOf(p);
            if (idx > 0) {
              // 连击
              combo += 1;
              comboTimer = 120;
              const baseScore = idx;
              const multiplier = 1 + Math.floor(combo / 3) * 0.5;
              const gain = Math.ceil(baseScore * multiplier);
              score += gain;
              earnedThisRound += gain;
              scoreEl.textContent = score;

              spawnFloatScore(player.x, player.y - 30, '+' + gain);
              spawnParticles(player.x, player.y, getSkin().grad[0], 12);

              if (combo >= 2) {
                comboEl.textContent = `连击 ×${combo}`;
                comboEl.classList.add('show');
                sfx.combo(combo);
              } else {
                sfx.land();
              }

              // 中心命中加分
              const centerDist = Math.abs(player.x - p.x);
              if (centerDist < 8) {
                score += 5; earnedThisRound += 5;
                scoreEl.textContent = score;
                spawnFloatScore(p.x, p.y - 20, '+5 完美!');
                spawnParticles(p.x, p.y, '#ffd86b', 20);
              }

              platforms = platforms.slice(idx);
              while (platforms.length < 10) {
                const last = platforms[platforms.length - 1];
                platforms.push(newPlatform(last.x + last.w/2, last.y));
              }
            } else {
              sfx.land();
            }
            break;
          }
        }
      }

      if (player.y > H + 100) endGame();
    }

    // 连击计时
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer === 0) {
        combo = 0;
        comboEl.classList.remove('show');
      }
    }

    // 粒子
    particles.forEach(pt => {
      pt.x += pt.vx; pt.y += pt.vy;
      pt.vy += 0.2;
      pt.life -= 0.025;
    });
    particles = particles.filter(pt => pt.life > 0);

    // 相机
    const targetCamX = player.x - W * 0.3;
    camera.x += (targetCamX - camera.x) * 0.1;
  }

  function drawPlatform(p) {
    const x = p.x - camera.x;
    const y = p.y;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + p.h/2 + 4, p.w/2 * 0.9, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = p.color;
    if (p.type === 'cyl') {
      ctx.beginPath();
      ctx.ellipse(x, y - p.h/2, p.w/2, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - p.w/2, y - p.h/2, p.w, p.h);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(x, y + p.h/2, p.w/2, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(x - p.w/2, y - p.h/2, p.w, p.h);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(x - p.w/2, y - p.h/2, p.w, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x - p.w/2, y + p.h/2 - 4, p.w, 4);
    }
    // 中心点
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(x, y - p.h/2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawPlayer() {
    const x = player.x - camera.x;
    const y = player.y;
    const sq = player.squash;
    const w = player.w * (1 + sq * 0.5);
    const h = player.h * (1 - sq * 0.7);
    const skin = getSkin();

    ctx.save();
    ctx.translate(x, y);
    if (state === STATE.JUMPING) ctx.rotate(player.rotation);

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, h/2 + 4, w/2 * 0.8, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    const grad = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    grad.addColorStop(0, skin.grad[0]);
    grad.addColorStop(1, skin.grad[1]);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, -h*0.2, w*0.55, h*0.32, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, h*0.15, w*0.4, h*0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-w*0.15, -h*0.3, w*0.12, h*0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(pt => {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x - camera.x, pt.y, pt.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawBackground() {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const offsetX = camera.x * 0.3;
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 137 - offsetX) % W + W) % W;
      const sy = (i * 73) % (H * 0.5);
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  // 蓄力指示
  function drawChargeBar() {
    if (state !== STATE.CHARGING) return;
    const dt = Math.min(1500, performance.now() - chargeStart);
    const power = dt / 1500;
    const barW = 60;
    const x = player.x - camera.x;
    const y = player.y - player.h/2 - 14;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x - barW/2, y, barW, 4);
    ctx.fillStyle = power > 0.9 ? '#ff5e5e' : '#ffd86b';
    ctx.fillRect(x - barW/2, y, barW * power, 4);
  }

  function loop() {
    update();
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    platforms.forEach(drawPlatform);
    drawPlayer();
    drawChargeBar();
    drawParticles();
    requestAnimationFrame(loop);
  }
  loop();

  // 进入时检查签到
  if (!isSignedToday()) {
    document.getElementById('signin-btn').classList.add('alert');
  }

})();
</script>
</body>
</html>
