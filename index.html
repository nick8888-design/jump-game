<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>跳跳跳 / Jump Jump</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #0e1320;
    color: #fff;
    user-select: none;
  }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  .ad-banner, .ad-bottom {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    color: #6b7794; font-size: 11px; letter-spacing: 2px;
  }
  .ad-banner { height: 60px; background: linear-gradient(90deg, #1a2238, #232b45); border-bottom: 1px solid rgba(255,255,255,0.05); }
  .ad-bottom { height: 50px; background: linear-gradient(90deg, #232b45, #1a2238); border-top: 1px solid rgba(255,255,255,0.05); }

  #game-wrap { flex: 1 1 auto; position: relative; overflow: hidden; }
  canvas {
    display: block; width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a2347 0%, #2d3561 50%, #4a3d6b 100%);
  }

  .hud {
    position: absolute; top: 16px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 20px;
    pointer-events: none; z-index: 5;
  }
  .score-wrap { display: flex; flex-direction: column; }
  .score { font-size: 42px; font-weight: 800; text-shadow: 0 2px 12px rgba(0,0,0,0.4); letter-spacing: -1px; line-height: 1; }
  .combo { font-size: 14px; color: #ffd86b; margin-top: 4px; opacity: 0; transform: translateY(-4px); transition: opacity 0.2s, transform 0.2s; }
  .combo.show { opacity: 1; transform: translateY(0); }
  .right-info { text-align: right; }
  .best { font-size: 12px; opacity: 0.7; }
  .coin-display { font-size: 14px; margin-top: 4px; color: #ffd86b; font-weight: 600; }

  .hint {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    font-size: 13px; opacity: 0.6; letter-spacing: 1px;
    pointer-events: none; z-index: 5; text-align: center; white-space: nowrap;
  }
  .hint.hidden { opacity: 0; }

  .float-score {
    position: absolute; pointer-events: none;
    font-size: 28px; font-weight: 800; color: #ffd86b;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    z-index: 6; animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.2); }
    100% { opacity: 0; transform: translateY(-60px) scale(1); }
  }

  .overlay {
    position: absolute; inset: 0;
    background: rgba(14, 19, 32, 0.88);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; z-index: 10;
    transition: opacity 0.3s; overflow-y: auto;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .title {
    font-size: 56px; font-weight: 800;
    background: linear-gradient(135deg, #ffd86b, #ff7eb3);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    margin-bottom: 8px; letter-spacing: -2px;
    text-align: center;
  }
  .subtitle { font-size: 13px; opacity: 0.6; margin-bottom: 28px; letter-spacing: 2px; }
  .end-score { font-size: 14px; opacity: 0.6; margin-bottom: 4px; }
  .end-num { font-size: 64px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .end-best { font-size: 13px; opacity: 0.5; margin-bottom: 24px; text-align: center; }

  .btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #ffd86b, #ff7eb3);
    color: #1a1a2e; border: none; border-radius: 100px;
    font-size: 17px; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; box-shadow: 0 8px 24px rgba(255, 126, 179, 0.3);
    transition: transform 0.15s; margin-bottom: 10px; min-width: 200px;
  }
  .btn:active { transform: scale(0.96); }
  .btn-secondary {
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: none; font-size: 14px; padding: 12px 32px;
  }

  .top-buttons {
    position: absolute; top: 70px; right: 16px;
    display: flex; flex-direction: column; gap: 8px; z-index: 5;
  }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    transition: transform 0.15s;
    position: relative;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.alert::after {
    content: ''; position: absolute;
    width: 8px; height: 8px; background: #ff5e5e;
    border-radius: 50%; top: 8px; right: 8px;
  }
  .lang-btn {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .panel-title { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .panel-sub { font-size: 12px; opacity: 0.6; margin-bottom: 24px; letter-spacing: 1px; }

  .skins {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    width: 100%; max-width: 360px; margin-bottom: 20px;
  }
  .skin-card {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    transition: all 0.2s; overflow: hidden;
  }
  .skin-card.owned { border-color: rgba(255,216,107,0.4); }
  .skin-card.active {
    border-color: #ffd86b;
    background: rgba(255,216,107,0.15);
    transform: scale(1.04);
  }
  .skin-preview {
    width: 36px; height: 50px;
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    margin-bottom: 8px;
  }
  .skin-name { font-size: 11px; font-weight: 600; text-align: center; padding: 0 4px; }
  .skin-cost { font-size: 10px; opacity: 0.7; margin-top: 2px; color: #ffd86b; text-align: center; }
  .skin-card.locked .skin-preview { filter: grayscale(1) brightness(0.5); }
  .skin-card.locked .skin-name { opacity: 0.5; }

  .signin-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    width: 100%; max-width: 360px; margin-bottom: 20px;
  }
  .day-card {
    aspect-ratio: 0.8;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 10px; position: relative;
  }
  .day-card.signed { background: rgba(255,216,107,0.2); border-color: rgba(255,216,107,0.5); }
  .day-card.today { border-color: #ff7eb3; box-shadow: 0 0 12px rgba(255,126,179,0.4); }
  .day-num { font-size: 10px; opacity: 0.6; margin-bottom: 2px; }
  .day-reward { font-size: 13px; font-weight: 700; color: #ffd86b; }
  .day-card.signed .day-reward::after { content: ' ✓'; color: #6bff9e; }

  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); color: #fff;
    padding: 14px 24px; border-radius: 12px; font-size: 14px;
    z-index: 100; pointer-events: none;
    opacity: 0; transition: opacity 0.3s;
    max-width: 80%; text-align: center;
  }
  .toast.show { opacity: 1; }

  /* 开始页语言切换 */
  .lang-toggle {
    position: absolute;
    top: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: transform 0.15s;
  }
  .lang-toggle:active { transform: scale(0.95); }
  .lang-toggle span { transition: color 0.2s, opacity 0.2s; }
  .lang-toggle .lang-divider { color: rgba(255,255,255,0.3); }
  .lang-toggle .active {
    color: #ffd86b;
  }
  .lang-toggle .inactive {
    color: #fff;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div id="app">

  <!-- 顶部广告位 -->
  <div class="ad-banner" id="ad-top" data-i18n="ad_top">广告位 · 顶部 BANNER</div>

  <div id="game-wrap">
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="score-wrap">
        <div class="score" id="score">0</div>
        <div class="combo" id="combo"></div>
      </div>
      <div class="right-info">
        <div class="best"><span data-i18n="best">最佳</span> <span id="best">0</span></div>
        <div class="coin-display">🪙 <span id="coins">0</span></div>
      </div>
    </div>

    <div class="top-buttons">
      <div class="icon-btn lang-btn" id="lang-btn" title="Language">EN</div>
      <div class="icon-btn" id="signin-btn">📅</div>
      <div class="icon-btn" id="skin-btn">👕</div>
      <div class="icon-btn" id="sound-btn">🔊</div>
    </div>

    <div class="hint" id="hint" data-i18n="hint">按住屏幕蓄力 · 松开起跳</div>

    <!-- 开始界面 -->
    <div class="overlay" id="start-screen">
      <!-- 语言切换:开始页右上角 -->
      <div class="lang-toggle" id="start-lang-btn">
        <span id="start-lang-zh">中文</span>
        <span class="lang-divider">|</span>
        <span id="start-lang-en">EN</span>
      </div>
      <div class="title" data-i18n="game_title">跳跳跳</div>
      <div class="subtitle" data-i18n="game_subtitle">JUMP · JUMP · JUMP</div>
      <button class="btn" id="start-btn" data-i18n="start">开 始</button>
      <button class="btn btn-secondary" id="start-skin-btn"><span>👕 </span><span data-i18n="skin">皮肤</span></button>
      <button class="btn btn-secondary" id="start-share-btn"><span>📤 </span><span data-i18n="share_friends">分享给好友</span></button>
    </div>

    <!-- 结束界面 -->
    <div class="overlay hidden" id="end-screen">
      <div class="end-score" data-i18n="this_round">本局得分</div>
      <div class="end-num" id="end-num">0</div>
      <div class="end-best">
        <span data-i18n="best">最佳</span> <span id="end-best">0</span> · 
        <span data-i18n="earned">获得</span> 🪙<span id="earned-coins">0</span>
      </div>
      <button class="btn" id="restart-btn" data-i18n="play_again">再来一局</button>
      <button class="btn btn-secondary" id="revive-btn"><span>📺 </span><span data-i18n="revive">看广告复活</span></button>
      <button class="btn btn-secondary" id="end-share-btn"><span>📤 </span><span data-i18n="share_score">分享炫耀战绩</span></button>
    </div>

    <!-- 皮肤面板 -->
    <div class="overlay hidden" id="skin-screen">
      <div class="panel-title" data-i18n="skin">皮肤</div>
      <div class="panel-sub">SKINS · 🪙 <span id="skin-coins">0</span></div>
      <div class="skins" id="skin-grid"></div>
      <button class="btn btn-secondary" id="skin-close" data-i18n="close">关 闭</button>
    </div>

    <!-- 签到面板 -->
    <div class="overlay hidden" id="signin-screen">
      <div class="panel-title" data-i18n="daily_signin">每日签到</div>
      <div class="panel-sub" data-i18n="signin_sub">连续签到奖励翻倍</div>
      <div class="signin-grid" id="signin-grid"></div>
      <button class="btn" id="signin-action-btn" data-i18n="signin_now">立即签到</button>
      <button class="btn btn-secondary" id="signin-close" data-i18n="close">关 闭</button>
    </div>

  </div>

  <!-- 底部广告位 -->
  <div class="ad-bottom" id="ad-bottom" data-i18n="ad_bottom">广告位 · 底部</div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){

  // =========================================================
  // 国际化 i18n
  // =========================================================
  const I18N = {
    'zh': {
      ad_top: '广告位 · 顶部 BANNER',
      ad_bottom: '广告位 · 底部',
      best: '最佳',
      hint: '按住屏幕蓄力 · 松开起跳',
      game_title: '跳跳跳',
      game_subtitle: 'JUMP · JUMP · JUMP',
      start: '开 始',
      skin: '皮肤',
      share_friends: '分享给好友',
      this_round: '本局得分',
      earned: '获得',
      play_again: '再来一局',
      revive: '看广告复活',
      share_score: '分享炫耀战绩',
      close: '关 闭',
      daily_signin: '每日签到',
      signin_sub: '连续签到奖励翻倍',
      signin_now: '立即签到',
      signed_today: '今日已签到',
      day_n: '第%d天',
      combo_x: '连击 ×%d',
      perfect: '+5 完美!',
      switched_to: '已切换到「%s」',
      unlocked: '解锁成功:%s',
      share_unlock: '分享成功,解锁:%s',
      bought: '购买成功!',
      not_enough_coins: '金币不够,继续跳吧~',
      signin_success: '签到成功!+🪙%d',
      ad_simulating: '模拟广告播放中... (3秒)',
      copied: '链接已复制,快去粘贴给好友!',
      copy_manually: '请手动复制网址分享',
      share_text: '我在「跳跳跳」拿了 %d 分,你来挑战一下?',
      use_this: '点击使用',
      using: '使用中',
      buy_ad: '📺 看广告',
      buy_share: '📤 分享',
      skin_default: '小桃子',
      skin_mint: '薄荷糖',
      skin_grape: '紫葡萄',
      skin_fire: '小火苗',
      skin_ice: '冰晶',
      skin_gold: '黄金',
      skin_panda: '熊猫',
      skin_rainbow: '彩虹',
      skin_galaxy: '星河',
    },
    'en': {
      ad_top: 'AD · TOP BANNER',
      ad_bottom: 'AD · BOTTOM',
      best: 'Best',
      hint: 'Hold to charge · Release to jump',
      game_title: 'Jump Jump',
      game_subtitle: 'JUMP · JUMP · JUMP',
      start: 'START',
      skin: 'Skins',
      share_friends: 'Share with friends',
      this_round: 'Your Score',
      earned: 'Earned',
      play_again: 'Play Again',
      revive: 'Watch Ad to Revive',
      share_score: 'Share Your Score',
      close: 'Close',
      daily_signin: 'Daily Check-in',
      signin_sub: 'Streak rewards double up',
      signin_now: 'Check in Now',
      signed_today: 'Already Checked In',
      day_n: 'Day %d',
      combo_x: 'Combo ×%d',
      perfect: '+5 PERFECT!',
      switched_to: 'Switched to "%s"',
      unlocked: 'Unlocked: %s',
      share_unlock: 'Shared! Unlocked: %s',
      bought: 'Purchased!',
      not_enough_coins: 'Not enough coins, keep jumping!',
      signin_success: 'Checked in! +🪙%d',
      ad_simulating: 'Simulating ad... (3s)',
      copied: 'Link copied! Paste to share.',
      copy_manually: 'Please copy the URL manually',
      share_text: 'I scored %d in Jump Jump, can you beat me?',
      use_this: 'Tap to use',
      using: 'In use',
      buy_ad: '📺 Watch Ad',
      buy_share: '📤 Share',
      skin_default: 'Peach',
      skin_mint: 'Mint',
      skin_grape: 'Grape',
      skin_fire: 'Flame',
      skin_ice: 'Ice',
      skin_gold: 'Gold',
      skin_panda: 'Panda',
      skin_rainbow: 'Rainbow',
      skin_galaxy: 'Galaxy',
    }
  };

  let lang = localStorage.getItem('lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');

  function t(key, ...args) {
    let s = (I18N[lang] && I18N[lang][key]) || I18N['en'][key] || key;
    args.forEach(a => { s = s.replace(/%[ds]/, a); });
    return s;
  }

  function applyLang() {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = t(key);
    });
    // 顶部语言按钮
    document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中';
    // 开始页语言切换按钮
    const zhSpan = document.getElementById('start-lang-zh');
    const enSpan = document.getElementById('start-lang-en');
    if (zhSpan && enSpan) {
      zhSpan.className = lang === 'zh' ? 'active' : 'inactive';
      enSpan.className = lang === 'en' ? 'active' : 'inactive';
    }
    // 这些动态生成的UI需要重新渲染
    if (typeof renderSkins === 'function') renderSkins();
    if (typeof renderSignin === 'function') renderSignin();
  }

  document.getElementById('lang-btn').addEventListener('click', () => {
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('lang', lang);
    applyLang();
  });

  // 开始页的语言切换:点中文/EN直接切到对应语言
  document.getElementById('start-lang-btn').addEventListener('click', (e) => {
    // 点击时根据当前语言反向切换(无论点的是哪个span)
    lang = lang === 'zh' ? 'en' : 'zh';
    localStorage.setItem('lang', lang);
    applyLang();
  });

  // =========================================================
  // 工具函数
  // =========================================================
  const LS = {
    get: (k, d) => { try { const v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); } catch(e) { return d; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
  };
  const rand = (a, b) => a + Math.random() * (b - a);
  const today = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  function toast(msg, dur=1500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), dur);
  }

  // =========================================================
  // 音效
  // =========================================================
  let audioCtx = null;
  let soundOn = LS.get('sound_on', true);

  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { soundOn = false; }
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function beep(freq, dur, type='sine', vol=0.15) {
    if (!soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  const sfx = {
    charge: () => beep(220, 0.1, 'square', 0.08),
    jump:   () => beep(660, 0.15, 'triangle', 0.2),
    land:   () => { beep(440, 0.08, 'sine', 0.2); setTimeout(()=>beep(550, 0.1, 'sine', 0.15), 50); },
    combo:  (n) => beep(600 + n*100, 0.12, 'triangle', 0.2),
    fail:   () => { beep(200, 0.2, 'sawtooth', 0.15); setTimeout(()=>beep(150, 0.3, 'sawtooth', 0.15), 100); },
    coin:   () => beep(880, 0.1, 'square', 0.15),
  };

  // =========================================================
  // 皮肤系统
  // =========================================================
  const SKINS = [
    { id: 'default', nameKey: 'skin_default', cost: 0,    grad: ['#ff7eb3', '#ffd86b'] },
    { id: 'mint',    nameKey: 'skin_mint',    cost: 100,  grad: ['#6bffa8', '#6be3ff'] },
    { id: 'grape',   nameKey: 'skin_grape',   cost: 200,  grad: ['#a06bff', '#ff6bd9'] },
    { id: 'fire',    nameKey: 'skin_fire',    cost: 500,  grad: ['#ff4d4d', '#ffb84d'] },
    { id: 'ice',     nameKey: 'skin_ice',     cost: 800,  grad: ['#a6e9ff', '#ffffff'] },
    { id: 'gold',    nameKey: 'skin_gold',    cost: 1500, grad: ['#ffd700', '#ff9500'] },
    { id: 'panda',   nameKey: 'skin_panda',   cost: 'ad', grad: ['#ffffff', '#2a2a2a'] },
    { id: 'rainbow', nameKey: 'skin_rainbow', cost: 'share', grad: ['#ff5e5e', '#5eaaff'] },
    { id: 'galaxy',  nameKey: 'skin_galaxy',  cost: 3000, grad: ['#1a0a3a', '#7e5eff'] },
  ];

  let coins = LS.get('coins', 0);
  let ownedSkins = LS.get('owned_skins', ['default']);
  let activeSkin = LS.get('active_skin', 'default');
  function getSkin() { return SKINS.find(s => s.id === activeSkin) || SKINS[0]; }
  function updateCoinsUI() {
    document.getElementById('coins').textContent = coins;
    document.getElementById('skin-coins').textContent = coins;
  }
  function saveSkins() {
    LS.set('coins', coins);
    LS.set('owned_skins', ownedSkins);
    LS.set('active_skin', activeSkin);
    updateCoinsUI();
  }

  function renderSkins() {
    const grid = document.getElementById('skin-grid');
    if (!grid) return;
    grid.innerHTML = '';
    SKINS.forEach(skin => {
      const owned = ownedSkins.includes(skin.id);
      const active = activeSkin === skin.id;
      const card = document.createElement('div');
      card.className = 'skin-card' + (owned ? ' owned' : ' locked') + (active ? ' active' : '');

      const preview = document.createElement('div');
      preview.className = 'skin-preview';
      preview.style.background = `linear-gradient(135deg, ${skin.grad[0]}, ${skin.grad[1]})`;
      card.appendChild(preview);

      const name = document.createElement('div');
      name.className = 'skin-name';
      name.textContent = t(skin.nameKey);
      card.appendChild(name);

      const tip = document.createElement('div');
      tip.className = 'skin-cost';
      if (!owned) {
        if (skin.cost === 'ad') tip.textContent = t('buy_ad');
        else if (skin.cost === 'share') tip.textContent = t('buy_share');
        else tip.textContent = '🪙 ' + skin.cost;
      } else if (!active) {
        tip.textContent = t('use_this');
      } else {
        tip.textContent = t('using');
        tip.style.color = '#6bff9e';
      }
      card.appendChild(tip);

      card.addEventListener('click', () => handleSkinClick(skin));
      grid.appendChild(card);
    });
  }

  function handleSkinClick(skin) {
    const owned = ownedSkins.includes(skin.id);
    if (owned) {
      activeSkin = skin.id;
      saveSkins(); renderSkins();
      sfx.coin();
      toast(t('switched_to', t(skin.nameKey)));
      return;
    }
    if (skin.cost === 'ad') {
      simulateAd(() => {
        ownedSkins.push(skin.id);
        saveSkins(); renderSkins();
        toast(t('unlocked', t(skin.nameKey)));
        sfx.coin();
      });
    } else if (skin.cost === 'share') {
      doShare(() => {
        ownedSkins.push(skin.id);
        saveSkins(); renderSkins();
        toast(t('share_unlock', t(skin.nameKey)));
        sfx.coin();
      });
    } else {
      if (coins >= skin.cost) {
        coins -= skin.cost;
        ownedSkins.push(skin.id);
        activeSkin = skin.id;
        saveSkins(); renderSkins();
        sfx.coin();
        toast(t('bought'));
      } else {
        toast(t('not_enough_coins'));
      }
    }
  }

  // =========================================================
  // 签到
  // =========================================================
  const SIGNIN_REWARDS = [10, 20, 30, 50, 80, 120, 200];
  let signInData = LS.get('signin', { lastDate: '', streak: 0 });

  function isSignedToday() { return signInData.lastDate === today(); }

  function renderSignin() {
    const grid = document.getElementById('signin-grid');
    if (!grid) return;
    grid.innerHTML = '';
    const streak = signInData.streak;
    const signedToday = isSignedToday();
    for (let i = 0; i < 7; i++) {
      const day = document.createElement('div');
      const isPast = i < streak;
      const isToday = (signedToday && i === streak - 1) || (!signedToday && i === streak);
      day.className = 'day-card' + (isPast ? ' signed' : '') + (isToday ? ' today' : '');
      day.innerHTML = `<div class="day-num">${t('day_n', i+1)}</div><div class="day-reward">🪙${SIGNIN_REWARDS[i]}</div>`;
      grid.appendChild(day);
    }
    const btn = document.getElementById('signin-action-btn');
    if (signedToday) {
      btn.textContent = t('signed_today');
      btn.style.opacity = 0.5;
      btn.disabled = true;
    } else {
      btn.textContent = t('signin_now');
      btn.style.opacity = 1;
      btn.disabled = false;
    }
    document.getElementById('signin-btn').classList.toggle('alert', !signedToday);
  }

  function doSignin() {
    if (isSignedToday()) return;
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
    if (signInData.lastDate !== yKey) signInData.streak = 0;
    const idx = signInData.streak % 7;
    const reward = SIGNIN_REWARDS[idx];
    coins += reward;
    signInData.streak += 1;
    signInData.lastDate = today();
    LS.set('signin', signInData);
    saveSkins();
    sfx.coin();
    toast(t('signin_success', reward));
    renderSignin();
  }

  // =========================================================
  // 分享 + 模拟广告
  // =========================================================
  function doShare(onSuccess) {
    const text = t('share_text', best);
    const url = location.href;
    if (navigator.share) {
      navigator.share({ title: t('game_title'), text, url }).then(() => {
        onSuccess && onSuccess();
      }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text + ' ' + url).then(() => {
        toast(t('copied'));
        onSuccess && onSuccess();
      });
    } else {
      toast(t('copy_manually'));
      onSuccess && onSuccess();
    }
  }

  function simulateAd(onComplete) {
    toast(t('ad_simulating'), 3000);
    setTimeout(onComplete, 3000);
  }

  // =========================================================
  // 主游戏
  // =========================================================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const comboEl = document.getElementById('combo');
  const hintEl = document.getElementById('hint');
  const startScreen = document.getElementById('start-screen');
  const endScreen = document.getElementById('end-screen');
  const skinScreen = document.getElementById('skin-screen');
  const signinScreen = document.getElementById('signin-screen');
  const endNumEl = document.getElementById('end-num');
  const endBestEl = document.getElementById('end-best');
  const earnedCoinsEl = document.getElementById('earned-coins');

  let W = 0, H = 0, DPR = window.devicePixelRatio || 1;
  function resize() {
    const wrap = canvas.parentElement;
    W = wrap.clientWidth; H = wrap.clientHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const STATE = { READY: 0, CHARGING: 1, JUMPING: 2, OVER: 3 };
  let state = STATE.READY;

  const player = { x: 0, y: 0, w: 18, h: 38, vx: 0, vy: 0, squash: 0, rotation: 0 };

  let platforms = [];
  let camera = { x: 0 };
  let score = 0;
  let best = LS.get('jump_best', 0);
  let combo = 0;
  let comboTimer = 0;
  let chargeStart = 0;
  let chargePower = 0;
  let usedRevive = false;
  let earnedThisRound = 0;
  let particles = [];

  bestEl.textContent = best;
  updateCoinsUI();

  function newPlatform(prevX, prevY) {
    const types = ['box', 'cyl'];
    const type = types[Math.floor(Math.random() * types.length)];
    const w = rand(60, 90);
    const gap = rand(70, 160);
    return {
      x: prevX + gap, y: prevY + rand(-20, 20),
      w, h: 22, type,
      color: `hsl(${Math.floor(rand(180, 320))}, 60%, 65%)`,
    };
  }

  function reset() {
    platforms = [];
    platforms.push({ x: 80, y: H * 0.65, w: 90, h: 22, type: 'box', color: '#ffd86b' });
    for (let i = 0; i < 10; i++) {
      const last = platforms[platforms.length - 1];
      platforms.push(newPlatform(last.x + last.w/2, last.y));
    }
    player.x = platforms[0].x;
    player.y = platforms[0].y - player.h/2 - 11;
    player.vx = 0; player.vy = 0; player.squash = 0; player.rotation = 0;
    camera.x = 0;
    score = 0;
    combo = 0; comboTimer = 0;
    earnedThisRound = 0;
    chargePower = 0;
    usedRevive = false;
    particles = [];
    scoreEl.textContent = 0;
    comboEl.classList.remove('show');
    state = STATE.READY;
    hintEl.classList.remove('hidden');
  }

  function startGame() {
    ensureAudio();
    reset();
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    skinScreen.classList.add('hidden');
    signinScreen.classList.add('hidden');
  }

  function endGame() {
    state = STATE.OVER;
    sfx.fail();
    endNumEl.textContent = score;
    if (score > best) {
      best = score;
      LS.set('jump_best', best);
    }
    bestEl.textContent = best;
    endBestEl.textContent = best;
    coins += earnedThisRound;
    saveSkins();
    earnedCoinsEl.textContent = earnedThisRound;
    document.getElementById('revive-btn').style.display = usedRevive ? 'none' : 'inline-block';
    setTimeout(() => endScreen.classList.remove('hidden'), 600);
  }

  function onPressStart(e) {
    if (e.target !== canvas) return;
    e.preventDefault();
    ensureAudio();
    if (state !== STATE.READY) return;
    state = STATE.CHARGING;
    chargeStart = performance.now();
    hintEl.classList.add('hidden');
    sfx.charge();
  }
  function onPressEnd(e) {
    if (state !== STATE.CHARGING) return;
    e.preventDefault();
    const dt = Math.min(1500, performance.now() - chargeStart);
    chargePower = dt / 1500;
    player.vx = chargePower * 12 + 2;
    player.vy = -18 - chargePower * 4;
    state = STATE.JUMPING;
    player.squash = 0;
    sfx.jump();
  }
  canvas.addEventListener('touchstart', onPressStart, { passive: false });
  canvas.addEventListener('touchend', onPressEnd, { passive: false });
  canvas.addEventListener('mousedown', onPressStart);
  canvas.addEventListener('mouseup', onPressEnd);

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', startGame);

  document.getElementById('start-skin-btn').addEventListener('click', () => {
    renderSkins();
    skinScreen.classList.remove('hidden');
  });
  document.getElementById('skin-btn').addEventListener('click', () => {
    renderSkins();
    skinScreen.classList.remove('hidden');
  });
  document.getElementById('skin-close').addEventListener('click', () => {
    skinScreen.classList.add('hidden');
  });

  document.getElementById('signin-btn').addEventListener('click', () => {
    renderSignin();
    signinScreen.classList.remove('hidden');
  });
  document.getElementById('signin-close').addEventListener('click', () => {
    signinScreen.classList.add('hidden');
  });
  document.getElementById('signin-action-btn').addEventListener('click', doSignin);

  document.getElementById('start-share-btn').addEventListener('click', () => doShare());
  document.getElementById('end-share-btn').addEventListener('click', () => doShare());

  document.getElementById('sound-btn').addEventListener('click', (e) => {
    soundOn = !soundOn;
    LS.set('sound_on', soundOn);
    e.currentTarget.textContent = soundOn ? '🔊' : '🔇';
    if (soundOn) ensureAudio();
  });
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';

  document.getElementById('revive-btn').addEventListener('click', () => {
    simulateAd(() => {
      usedRevive = true;
      let target = platforms[0], bd = Infinity;
      platforms.forEach(p => {
        const d = Math.abs(p.x - player.x);
        if (d < bd) { bd = d; target = p; }
      });
      player.x = target.x;
      player.y = target.y - player.h/2 - 11;
      player.vx = 0; player.vy = 0;
      state = STATE.READY;
      endScreen.classList.add('hidden');
      hintEl.classList.remove('hidden');
    });
  });

  // 物理 + 渲染
  const G = 0.6;

  function spawnParticles(x, y, color, n=8) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: rand(-3, 3), vy: rand(-5, -1),
        life: 1, color, size: rand(2, 5),
      });
    }
  }

  function spawnFloatScore(x, y, text) {
    const el = document.createElement('div');
    el.className = 'float-score';
    el.textContent = text;
    el.style.left = (x - camera.x) + 'px';
    el.style.top = y + 'px';
    document.getElementById('game-wrap').appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function update() {
    if (state === STATE.CHARGING) {
      const dt = Math.min(1500, performance.now() - chargeStart);
      player.squash = (dt / 1500) * 0.5;
    } else {
      player.squash *= 0.85;
    }

    if (state === STATE.JUMPING) {
      player.x += player.vx;
      player.y += player.vy;
      player.vy += G;
      player.rotation += 0.2;

      if (player.vy > 0) {
        for (const p of platforms) {
          const inX = player.x > p.x - p.w/2 && player.x < p.x + p.w/2;
          const playerBottom = player.y + player.h/2;
          if (inX && playerBottom >= p.y - p.h/2 && playerBottom <= p.y - p.h/2 + 20) {
            player.y = p.y - p.h/2 - player.h/2;
            player.vy = 0; player.vx = 0; player.rotation = 0;
            state = STATE.READY;
            hintEl.classList.remove('hidden');

            const idx = platforms.indexOf(p);
            if (idx > 0) {
              combo += 1;
              comboTimer = 120;
              const baseScore = idx;
              const multiplier = 1 + Math.floor(combo / 3) * 0.5;
              const gain = Math.ceil(baseScore * multiplier);
              score += gain;
              earnedThisRound += gain;
              scoreEl.textContent = score;

              spawnFloatScore(player.x, player.y - 30, '+' + gain);
              spawnParticles(player.x, player.y, getSkin().grad[0], 12);

              if (combo >= 2) {
                comboEl.textContent = t('combo_x', combo);
                comboEl.classList.add('show');
                sfx.combo(combo);
              } else {
                sfx.land();
              }

              const centerDist = Math.abs(player.x - p.x);
              if (centerDist < 8) {
                score += 5; earnedThisRound += 5;
                scoreEl.textContent = score;
                spawnFloatScore(p.x, p.y - 20, t('perfect'));
                spawnParticles(p.x, p.y, '#ffd86b', 20);
              }

              platforms = platforms.slice(idx);
              while (platforms.length < 10) {
                const last = platforms[platforms.length - 1];
                platforms.push(newPlatform(last.x + last.w/2, last.y));
              }
            } else {
              sfx.land();
            }
            break;
          }
        }
      }

      if (player.y > H + 100) endGame();
    }

    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer === 0) {
        combo = 0;
        comboEl.classList.remove('show');
      }
    }

    particles.forEach(pt => {
      pt.x += pt.vx; pt.y += pt.vy;
      pt.vy += 0.2;
      pt.life -= 0.025;
    });
    particles = particles.filter(pt => pt.life > 0);

    const targetCamX = player.x - W * 0.3;
    camera.x += (targetCamX - camera.x) * 0.1;
  }

  function drawPlatform(p) {
    const x = p.x - camera.x;
    const y = p.y;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + p.h/2 + 4, p.w/2 * 0.9, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = p.color;
    if (p.type === 'cyl') {
      ctx.beginPath();
      ctx.ellipse(x, y - p.h/2, p.w/2, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - p.w/2, y - p.h/2, p.w, p.h);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(x, y + p.h/2, p.w/2, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(x - p.w/2, y - p.h/2, p.w, p.h);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(x - p.w/2, y - p.h/2, p.w, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x - p.w/2, y + p.h/2 - 4, p.w, 4);
    }
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(x, y - p.h/2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawPlayer() {
    const x = player.x - camera.x;
    const y = player.y;
    const sq = player.squash;
    const w = player.w * (1 + sq * 0.5);
    const h = player.h * (1 - sq * 0.7);
    const skin = getSkin();

    ctx.save();
    ctx.translate(x, y);
    if (state === STATE.JUMPING) ctx.rotate(player.rotation);

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, h/2 + 4, w/2 * 0.8, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    const grad = ctx.createLinearGradient(-w/2, -h/2, w/2, h/2);
    grad.addColorStop(0, skin.grad[0]);
    grad.addColorStop(1, skin.grad[1]);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, -h*0.2, w*0.55, h*0.32, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, h*0.15, w*0.4, h*0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-w*0.15, -h*0.3, w*0.12, h*0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(pt => {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x - camera.x, pt.y, pt.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawBackground() {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const offsetX = camera.x * 0.3;
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 137 - offsetX) % W + W) % W;
      const sy = (i * 73) % (H * 0.5);
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  function drawChargeBar() {
    if (state !== STATE.CHARGING) return;
    const dt = Math.min(1500, performance.now() - chargeStart);
    const power = dt / 1500;
    const barW = 60;
    const x = player.x - camera.x;
    const y = player.y - player.h/2 - 14;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x - barW/2, y, barW, 4);
    ctx.fillStyle = power > 0.9 ? '#ff5e5e' : '#ffd86b';
    ctx.fillRect(x - barW/2, y, barW * power, 4);
  }

  function loop() {
    update();
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    platforms.forEach(drawPlatform);
    drawPlayer();
    drawChargeBar();
    drawParticles();
    requestAnimationFrame(loop);
  }
  loop();

  if (!isSignedToday()) {
    document.getElementById('signin-btn').classList.add('alert');
  }

  // 初始应用语言
  applyLang();

})();
</script>
</body>
</html>
